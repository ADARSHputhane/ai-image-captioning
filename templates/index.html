<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLIP Image Captioning</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f4f7f6;
        color: #333;
        max-width: 600px;
        margin: 50px auto;
        text-align: center;
        padding: 20px;
      }
      h2 {
        color: #2c3e50;
      }
      .upload-container {
        background: white;
        border: 2px dashed #bdc3c7;
        padding: 40px 20px;
        margin-bottom: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }
      input[type="file"] {
        margin-bottom: 20px;
      }
      button {
        background-color: #3498db;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s;
      }
      button:hover {
        background-color: #2980b9;
      }
      img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        margin-top: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      #caption-result {
        font-size: 1.3em;
        font-weight: 600;
        color: #27ae60;
        margin-top: 20px;
        padding: 15px;
        background: #e8f8f5;
        border-radius: 8px;
      }
      .loader {
        display: none;
        margin-top: 20px;
        font-weight: bold;
        color: #7f8c8d;
      }
    </style>
  </head>
  <body>
    <h2>AI Image Captioning</h2>
    <p>Powered by Hugging Face BLIP</p>

    <div class="upload-container">
      <form id="uploadForm">
        <input
          type="file"
          id="imageInput"
          name="image"
          accept="image/*"
          required
        />
        <br />
        <button type="submit">Generate Caption</button>
      </form>
    </div>

    <div class="loader" id="loader">Processing image... Please wait.</div>

    <div id="result" style="display: none">
      <img id="uploadedImage" src="" alt="Uploaded Image" />
      <div id="caption-result"></div>
    </div>

    <script>
      document
        .getElementById("uploadForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault(); // Prevent standard form submission

          const fileInput = document.getElementById("imageInput");
          if (fileInput.files.length === 0) return;

          const formData = new FormData();
          formData.append("image", fileInput.files[0]);

          // Show loader, hide previous results
          document.getElementById("loader").style.display = "block";
          document.getElementById("result").style.display = "none";

          try {
            // Send POST request to the Flask backend
            const response = await fetch("/caption", {
              method: "POST",
              body: formData,
            });

            const data = await response.json();
            document.getElementById("loader").style.display = "none";

            if (response.ok) {
              // Display image and caption
              document.getElementById("uploadedImage").src = data.image_url;
              document.getElementById("caption-result").innerText =
                data.caption;
              document.getElementById("result").style.display = "block";
            } else {
              alert("Error: " + data.error);
            }
          } catch (error) {
            document.getElementById("loader").style.display = "none";
            console.error("Error:", error);
            alert("An error occurred while connecting to the server.");
          }
        });
    </script>
  </body>
</html>
